<title>MK — Animated Profile Frame</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background:#030001;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Syne',sans-serif;
}

.pf-outer{
  position:relative;
  width:420px;height:520px;
  isolation:isolate;
}

/* Photo sits behind the SVG frame */
.pf-photo{
  position:absolute;
  top:14px;left:14px;
  width:392px;height:492px;
  object-fit:cover;object-position:top center;
  z-index:0;
}

.pf-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:1;overflow:visible;
}

/* ── Animations ─────────────────────────────────────── */

/* Scan sweep top → bottom */
@keyframes scanSweep{
  0%  {transform:translateY(-12px);opacity:0}
  4%  {opacity:1}
  93% {opacity:.65}
  100%{transform:translateY(532px);opacity:0}
}

/* Full-border pulse */
@keyframes borderPulse{
  0%,100%{opacity:.72}
  50%    {opacity:1}
}

/* Corner glow breathe */
@keyframes cGlow{
  0%,100%{opacity:.75}
  50%    {opacity:1}
}

/* Edge bar breathe (alternates with corners) */
@keyframes eGlow{
  0%,100%{opacity:.55}
  50%    {opacity:.9}
}

/* Ambient red bloom */
@keyframes ambient{
  0%,100%{opacity:0}
  50%    {opacity:1}
}

/* Side pip blink */
@keyframes pipBlink{
  0%,100%{opacity:.35}
  50%    {opacity:1}
}

/* HUD dot strobe */
@keyframes hudStrobe{
  0%,40%,100%{opacity:1}
  45%,85%    {opacity:.15}
}

/* Diagonal accent lines shimmer */
@keyframes diagShimmer{
  0%,100%{opacity:.45}
  50%    {opacity:.85}
}

/* Inner guide pulse */
@keyframes guideP{
  0%,100%{opacity:.1}
  50%    {opacity:.28}
}

.scan1{animation:scanSweep 3.8s linear infinite}
.scan2{animation:scanSweep 3.8s linear infinite;animation-delay:-1.9s}
.bp  {animation:borderPulse 2.8s ease-in-out infinite}
.cg  {animation:cGlow 2s ease-in-out infinite}
.cg2 {animation:cGlow 2s ease-in-out infinite;animation-delay:.6s}
.eg  {animation:eGlow 2.6s ease-in-out infinite}
.eg2 {animation:eGlow 2.6s ease-in-out infinite;animation-delay:1.3s}
.amb {animation:ambient 5s ease-in-out infinite}
.pip {animation:pipBlink 1.4s ease-in-out infinite}
.pi2 {animation:pipBlink 1.4s ease-in-out infinite;animation-delay:.7s}
.hd  {animation:hudStrobe 2.2s ease-in-out infinite}
.hd2 {animation:hudStrobe 2.2s ease-in-out infinite;animation-delay:1.1s}
.ds  {animation:diagShimmer 2.4s ease-in-out infinite}
.gp  {animation:guideP 3s ease-in-out infinite}

.hint{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  color:rgba(255,60,60,.38);font-size:10px;
  font-family:monospace;letter-spacing:1.4px;text-transform:uppercase;
  white-space:nowrap;
}
</style>
</head>
<body>

<div class="pf-outer">
  <!-- replace with your actual photo path -->
  <img class="pf-photo" src="karim_png.png" alt="Mohammed Karim"/>

  <svg class="pf-svg" viewBox="0 0 420 520" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>

      <!-- ── Glow filters ─────────────────────────────────────── -->
      <filter id="g2"  x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="2"  result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="g5"  x="-55%" y="-55%" width="210%" height="210%">
        <feGaussianBlur stdDeviation="5"  result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="g10" x="-70%" y="-70%" width="240%" height="240%">
        <feGaussianBlur stdDeviation="10" result="b1"/>
        <feGaussianBlur stdDeviation="3"  result="b2"/>
        <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="g18" x="-90%" y="-90%" width="280%" height="280%">
        <feGaussianBlur stdDeviation="18" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- ── Gradients ─────────────────────────────────────────── -->
      <linearGradient id="scanG" x1="0" x2="1" y1="0" y2="0">
        <stop offset="0%"   stop-color="#ff2a2a" stop-opacity="0"/>
        <stop offset="18%"  stop-color="#ff4040" stop-opacity=".65"/>
        <stop offset="50%"  stop-color="#ffffff" stop-opacity=".95"/>
        <stop offset="82%"  stop-color="#ff4040" stop-opacity=".65"/>
        <stop offset="100%" stop-color="#ff2a2a" stop-opacity="0"/>
      </linearGradient>

      <radialGradient id="ambG" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#ff1a1a" stop-opacity=".12"/>
        <stop offset="100%" stop-color="#ff1a1a" stop-opacity="0"/>
      </radialGradient>

      <!-- Corner fill gradients (dark metallic) -->
      <linearGradient id="cfTL" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0%"   stop-color="#1e0000" stop-opacity=".98"/>
        <stop offset="100%" stop-color="#060000" stop-opacity=".85"/>
      </linearGradient>
      <linearGradient id="cfTR" x1="1" x2="0" y1="0" y2="1">
        <stop offset="0%"   stop-color="#1e0000" stop-opacity=".98"/>
        <stop offset="100%" stop-color="#060000" stop-opacity=".85"/>
      </linearGradient>
      <linearGradient id="cfBL" x1="0" x2="1" y1="1" y2="0">
        <stop offset="0%"   stop-color="#1e0000" stop-opacity=".98"/>
        <stop offset="100%" stop-color="#060000" stop-opacity=".85"/>
      </linearGradient>
      <linearGradient id="cfBR" x1="1" x2="0" y1="1" y2="0">
        <stop offset="0%"   stop-color="#1e0000" stop-opacity=".98"/>
        <stop offset="100%" stop-color="#060000" stop-opacity=".85"/>
      </linearGradient>

    </defs>

    <!-- ══ AMBIENT RED BLOOM ═════════════════════════════════════ -->
    <rect class="amb" x="0" y="0" width="420" height="520" fill="url(#ambG)"/>

    <!-- ══ CORNER FILLS (dark metallic polygons) ════════════════ -->
    <!-- TL: 0,0 → 140,0 → 140,52 → 52,140 → 0,140 -->
    <polygon points="0,0 140,0 140,52 52,140 0,140" fill="url(#cfTL)"/>
    <!-- TR -->
    <polygon points="420,0 280,0 280,52 368,140 420,140" fill="url(#cfTR)"/>
    <!-- BL -->
    <polygon points="0,520 140,520 140,468 52,380 0,380" fill="url(#cfBL)"/>
    <!-- BR -->
    <polygon points="420,520 280,520 280,468 368,380 420,380" fill="url(#cfBR)"/>

    <!-- Inner accent triangle on each corner (subtle bright red fill) -->
    <polygon points="0,0 68,0 0,68"   fill="rgba(200,10,10,0.28)"/>
    <polygon points="420,0 352,0 420,68" fill="rgba(200,10,10,0.28)"/>
    <polygon points="0,520 68,520 0,452" fill="rgba(200,10,10,0.28)"/>
    <polygon points="420,520 352,520 420,452" fill="rgba(200,10,10,0.28)"/>

    <!-- ══ EDGE FILLS (between corners, very thin dark bars) ════ -->
    <rect x="140" y="0"   width="140" height="14" fill="#080001"/>
    <rect x="140" y="506" width="140" height="14" fill="#080001"/>
    <rect x="0"   y="140" width="14" height="240" fill="#080001"/>
    <rect x="406" y="140" width="14" height="240" fill="#080001"/>

    <!-- ══ FULL-WIDTH BORDER LINES (3 parallel per side) ════════ -->
    <!-- ── TOP (3 lines across full 420px width) ── -->
    <!-- Glow halo -->
    <line class="cg"  x1="0" y1="3"  x2="420" y2="3"  stroke="#ff1a1a" stroke-width="9" filter="url(#g18)" opacity=".45"/>
    <!-- Line 1 (outermost, brightest) -->
    <line class="bp"  x1="0" y1="3"  x2="420" y2="3"  stroke="#ff5252" stroke-width="2.2"/>
    <!-- Line 2 -->
    <line class="eg"  x1="0" y1="8"  x2="420" y2="8"  stroke="#cc0000" stroke-width="1.3" opacity=".85"/>
    <!-- Line 3 (innermost, dimmest) -->
    <line           x1="0" y1="13" x2="420" y2="13" stroke="#770000" stroke-width=".8"  opacity=".6"/>

    <!-- ── BOTTOM ── -->
    <line class="cg2" x1="0" y1="517" x2="420" y2="517" stroke="#ff1a1a" stroke-width="9" filter="url(#g18)" opacity=".45"/>
    <line class="bp"  x1="0" y1="517" x2="420" y2="517" stroke="#ff5252" stroke-width="2.2"/>
    <line class="eg2" x1="0" y1="512" x2="420" y2="512" stroke="#cc0000" stroke-width="1.3" opacity=".85"/>
    <line           x1="0" y1="507" x2="420" y2="507" stroke="#770000" stroke-width=".8"  opacity=".6"/>

    <!-- ── LEFT ── -->
    <line class="cg"  x1="3"  y1="0" x2="3"  y2="520" stroke="#ff1a1a" stroke-width="9" filter="url(#g18)" opacity=".45"/>
    <line class="bp"  x1="3"  y1="0" x2="3"  y2="520" stroke="#ff5252" stroke-width="2.2"/>
    <line class="eg"  x1="8"  y1="0" x2="8"  y2="520" stroke="#cc0000" stroke-width="1.3" opacity=".85"/>
    <line           x1="13" y1="0" x2="13" y2="520" stroke="#770000" stroke-width=".8"  opacity=".6"/>

    <!-- ── RIGHT ── -->
    <line class="cg2" x1="417" y1="0" x2="417" y2="520" stroke="#ff1a1a" stroke-width="9" filter="url(#g18)" opacity=".45"/>
    <line class="bp"  x1="417" y1="0" x2="417" y2="520" stroke="#ff5252" stroke-width="2.2"/>
    <line class="eg2" x1="412" y1="0" x2="412" y2="520" stroke="#cc0000" stroke-width="1.3" opacity=".85"/>
    <line           x1="407" y1="0" x2="407" y2="520" stroke="#770000" stroke-width=".8"  opacity=".6"/>

    <!-- ══ CORNER DIAGONAL CUTS ══════════════════════════════════ -->
    <!-- TL diagonal: (140,52) → (52,140) -->
    <line class="ds" x1="140" y1="52" x2="52" y2="140" stroke="#ff2a2a" stroke-width="7"  filter="url(#g10)" opacity=".55"/>
    <line class="ds" x1="140" y1="52" x2="52" y2="140" stroke="#ff5050" stroke-width="1.6" opacity=".9"/>
    <line           x1="128" y1="43" x2="43" y2="128" stroke="#880000" stroke-width=".9"  opacity=".5"/>

    <!-- TR diagonal: (280,52) → (368,140) -->
    <line class="ds" x1="280" y1="52" x2="368" y2="140" stroke="#ff2a2a" stroke-width="7"  filter="url(#g10)" opacity=".55"/>
    <line class="ds" x1="280" y1="52" x2="368" y2="140" stroke="#ff5050" stroke-width="1.6" opacity=".9"/>
    <line           x1="292" y1="43" x2="377" y2="128" stroke="#880000" stroke-width=".9"  opacity=".5"/>

    <!-- BL diagonal: (140,468) → (52,380) -->
    <line class="ds" x1="140" y1="468" x2="52" y2="380" stroke="#ff2a2a" stroke-width="7"  filter="url(#g10)" opacity=".55"/>
    <line class="ds" x1="140" y1="468" x2="52" y2="380" stroke="#ff5050" stroke-width="1.6" opacity=".9"/>
    <line           x1="128" y1="477" x2="43" y2="392" stroke="#880000" stroke-width=".9"  opacity=".5"/>

    <!-- BR diagonal: (280,468) → (368,380) -->
    <line class="ds" x1="280" y1="468" x2="368" y2="380" stroke="#ff2a2a" stroke-width="7"  filter="url(#g10)" opacity=".55"/>
    <line class="ds" x1="280" y1="468" x2="368" y2="380" stroke="#ff5050" stroke-width="1.6" opacity=".9"/>
    <line           x1="292" y1="477" x2="377" y2="392" stroke="#880000" stroke-width=".9"  opacity=".5"/>

    <!-- ══ CORNER ACCENT SQUARES ════════════════════════════════ -->
    <!-- TL -->
    <rect x="0" y="0" width="20" height="5"  fill="#ff4040"/>
    <rect x="0" y="0" width="5"  height="20" fill="#ff4040"/>
    <!-- Bright highlight edge -->
    <rect x="0" y="0" width="10" height="2"  fill="#ffffff" opacity=".75"/>
    <rect x="0" y="0" width="2"  height="10" fill="#ffffff" opacity=".75"/>
    <!-- Small diagonal mark near TL corner -->
    <line x1="25" y1="25" x2="42" y2="8" stroke="#ff3030" stroke-width="1.2" opacity=".6" filter="url(#g2)"/>
    <line x1="25" y1="25" x2="8"  y2="42" stroke="#ff3030" stroke-width="1.2" opacity=".6" filter="url(#g2)"/>

    <!-- TR -->
    <rect x="400" y="0" width="20" height="5"  fill="#ff4040"/>
    <rect x="415" y="0" width="5"  height="20" fill="#ff4040"/>
    <rect x="410" y="0" width="10" height="2"  fill="#ffffff" opacity=".75"/>
    <rect x="418" y="0" width="2"  height="10" fill="#ffffff" opacity=".75"/>
    <line x1="395" y1="25" x2="378" y2="8"  stroke="#ff3030" stroke-width="1.2" opacity=".6" filter="url(#g2)"/>
    <line x1="395" y1="25" x2="412" y2="42" stroke="#ff3030" stroke-width="1.2" opacity=".6" filter="url(#g2)"/>

    <!-- BL -->
    <rect x="0"  y="515" width="20" height="5"  fill="#ff4040"/>
    <rect x="0"  y="500" width="5"  height="20" fill="#ff4040"/>
    <rect x="0"  y="518" width="10" height="2"  fill="#ffffff" opacity=".75"/>
    <rect x="0"  y="510" width="2"  height="10" fill="#ffffff" opacity=".75"/>
    <line x1="25" y1="495" x2="42" y2="512" stroke="#ff3030" stroke-width="1.2" opacity=".6" filter="url(#g2)"/>
    <line x1="25" y1="495" x2="8"  y2="478" stroke="#ff3030" stroke-width="1.2" opacity=".6" filter="url(#g2)"/>

    <!-- BR -->
    <rect x="400" y="515" width="20" height="5"  fill="#ff4040"/>
    <rect x="415" y="500" width="5"  height="20" fill="#ff4040"/>
    <rect x="410" y="518" width="10" height="2"  fill="#ffffff" opacity=".75"/>
    <rect x="418" y="510" width="2"  height="10" fill="#ffffff" opacity=".75"/>
    <line x1="395" y1="495" x2="378" y2="512" stroke="#ff3030" stroke-width="1.2" opacity=".6" filter="url(#g2)"/>
    <line x1="395" y1="495" x2="412" y2="478" stroke="#ff3030" stroke-width="1.2" opacity=".6" filter="url(#g2)"/>

    <!-- ══ CORNER INNER GUIDES (subtle inner L-lines) ════════════ -->
    <!-- TL inner guide -->
    <path class="gp" d="M22,132 L22,22 L132,22" stroke="#ff2020" stroke-width=".8"/>
    <!-- TR inner guide -->
    <path class="gp" d="M398,132 L398,22 L288,22" stroke="#ff2020" stroke-width=".8"/>
    <!-- BL inner guide -->
    <path class="gp" d="M22,388 L22,498 L132,498" stroke="#ff2020" stroke-width=".8"/>
    <!-- BR inner guide -->
    <path class="gp" d="M398,388 L398,498 L288,498" stroke="#ff2020" stroke-width=".8"/>

    <!-- ══ SIDE ACCENT MARKS (edge mid-point markers) ════════════ -->
    <!-- Left side chevron ticks at 1/3 and 2/3 height -->
    <line x1="14" y1="212" x2="24" y2="200" stroke="#ff3030" stroke-width="1.2" opacity=".7"/>
    <line x1="14" y1="212" x2="24" y2="224" stroke="#ff3030" stroke-width="1.2" opacity=".7"/>
    <line x1="14" y1="308" x2="24" y2="296" stroke="#ff3030" stroke-width="1.2" opacity=".7"/>
    <line x1="14" y1="308" x2="24" y2="320" stroke="#ff3030" stroke-width="1.2" opacity=".7"/>
    <!-- Right side chevron ticks -->
    <line x1="406" y1="212" x2="396" y2="200" stroke="#ff3030" stroke-width="1.2" opacity=".7"/>
    <line x1="406" y1="212" x2="396" y2="224" stroke="#ff3030" stroke-width="1.2" opacity=".7"/>
    <line x1="406" y1="308" x2="396" y2="296" stroke="#ff3030" stroke-width="1.2" opacity=".7"/>
    <line x1="406" y1="308" x2="396" y2="320" stroke="#ff3030" stroke-width="1.2" opacity=".7"/>

    <!-- ══ SIDE PIPS (blinking accent blocks) ════════════════════ -->
    <!-- Left pips -->
    <rect class="pip" x="-2" y="247" width="14" height="4.5" fill="#ff4040"/>
    <rect            x="-2" y="255" width="9"  height="3"   fill="#aa0000" opacity=".75"/>
    <rect class="pi2" x="-2" y="262" width="14" height="4.5" fill="#ff4040"/>
    <rect x="-4" y="244" width="22" height="26" fill="rgba(255,30,30,0.1)" filter="url(#g10)"/>
    <!-- Right pips -->
    <rect class="pip" x="408" y="247" width="14" height="4.5" fill="#ff4040"/>
    <rect            x="413" y="255" width="9"  height="3"   fill="#aa0000" opacity=".75"/>
    <rect class="pi2" x="408" y="262" width="14" height="4.5" fill="#ff4040"/>
    <rect x="404" y="244" width="22" height="26" fill="rgba(255,30,30,0.1)" filter="url(#g10)"/>

    <!-- ══ QUARTER ACCENT LINES (horizontal, near 1/4 height pts) ════ -->
    <!-- Upper pair -->
    <line x1="14" y1="152" x2="56"  y2="152" stroke="#cc1010" stroke-width=".9" opacity=".6"/>
    <line x1="364" y1="152" x2="406" y2="152" stroke="#cc1010" stroke-width=".9" opacity=".6"/>
    <!-- Endcap dots -->
    <rect x="14"  y="150" width="2" height="4" fill="#ff4040" opacity=".9"/>
    <rect x="55"  y="150" width="2" height="4" fill="#ff4040" opacity=".9"/>
    <rect x="363" y="150" width="2" height="4" fill="#ff4040" opacity=".9"/>
    <rect x="404" y="150" width="2" height="4" fill="#ff4040" opacity=".9"/>
    <!-- Lower pair -->
    <line x1="14" y1="368" x2="56"  y2="368" stroke="#cc1010" stroke-width=".9" opacity=".6"/>
    <line x1="364" y1="368" x2="406" y2="368" stroke="#cc1010" stroke-width=".9" opacity=".6"/>
    <rect x="14"  y="366" width="2" height="4" fill="#ff4040" opacity=".9"/>
    <rect x="55"  y="366" width="2" height="4" fill="#ff4040" opacity=".9"/>
    <rect x="363" y="366" width="2" height="4" fill="#ff4040" opacity=".9"/>
    <rect x="404" y="366" width="2" height="4" fill="#ff4040" opacity=".9"/>

    <!-- ══ HUD STRIPS ════════════════════════════════════════════ -->
    <!-- Top HUD (between corner tips) -->
    <rect x="145" y="0" width="130" height="11"
          fill="#0b0001" stroke="#cc1010" stroke-width=".8" opacity=".95"/>
    <rect x="150" y="2" width="120" height="7" fill="rgba(180,0,0,0.12)"/>
    <rect class="hd"  x="147" y="2" width="5" height="7" fill="#ff2a2a"/>
    <rect class="hd2" x="268" y="2" width="5" height="7" fill="#ff2a2a"/>
    <text x="210" y="8.5" text-anchor="middle"
          fill="#ff4848" font-family="'Syne',monospace"
          font-size="5.5" letter-spacing="3.5" filter="url(#g2)">MKINSIGHT</text>

    <!-- Bottom HUD -->
    <rect x="115" y="509" width="190" height="12"
          fill="#0b0001" stroke="#cc1010" stroke-width=".8" opacity=".95"/>
    <rect x="120" y="511" width="180" height="8" fill="rgba(180,0,0,0.12)"/>
    <rect class="hd"  x="117" y="511" width="5" height="8" fill="#ff2a2a"/>
    <rect class="hd2" x="298" y="511" width="5" height="8" fill="#ff2a2a"/>
    <text x="210" y="518" text-anchor="middle"
          fill="#ff4848" font-family="'Syne',monospace"
          font-size="5" letter-spacing="4" filter="url(#g2)">DATA ANALYST · DEVELOPER</text>

    <!-- ══ SCAN LINES ════════════════════════════════════════════ -->
    <rect class="scan1" x="0" y="-12" width="420" height="12" fill="url(#scanG)" opacity=".6"/>
    <rect class="scan2" x="0" y="-22" width="420" height="6"  fill="url(#scanG)" opacity=".28"/>

  </svg>
</div>

<p class="hint">Browser → Screenshot for PNG &nbsp;·&nbsp; Screen-record for WebM / MP4</p>

</body>
</html>
